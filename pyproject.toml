[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "yet-another-onnx-builder"
version = "0.1.0"
description = "Converts models to ONNX format and other things"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = ["onnx>=1.14", "onnxruntime>=1.20", "torch>=2.10", "transformers"]

[project.optional-dependencies]
dev = ["pytest>=7", "ruff"]
docs = ["sphinx>=7", "furo", "onnx-diagnostic", "sphinx-runpython", "black"]
torch = ["torch>=2.10", "onnxscript>=0.1"]

[tool.setuptools.packages.find]
where = ["."]
include = ["yobx*"]

[tool.pytest.ini_options]
testpaths = ["unittests"]
