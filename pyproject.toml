[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "onnx_pipe"
version = "0.1.0"
description = "Pipe operator for building ONNX models"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
dependencies = [
    "onnx>=1.14",
]

[project.optional-dependencies]
dev = [
    "onnxruntime",
    "numpy",
    "pytest",
]

[tool.setuptools.packages.find]
include = ["onnx_pipe*"]
