name: ci-8-perpetual

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perpetual_tests:
    name: perpetual (ubuntu-latest, py3.12)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,perpetual,sklearn]"

      - name: pip freeze
        run: pip freeze

      - name: Run perpetual sklearn tests
        run: |
          PYTHONWARNINGS="ignore::FutureWarning,ignore::RuntimeWarning" \
            python -m unittest discover -s unittests/sklearn/_perpetual
