name: ci-2

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 4 * * *"

jobs:
  sklearn_tests:
    name: sklearn (ubuntu-latest, py3.12, sklearn-${{ matrix.sklearn-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sklearn-version: ["1.4", "1.8"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,lightgbm,sklearn,xgboost]"

      - name: Install scikit-learn==${{ matrix.sklearn-version }}
        run: pip install "scikit-learn==${{ matrix.sklearn-version }}.*" && pip freeze

      - name: pip freeze
        run: pip freeze

      - name: Run unittest files having an issue with pytest
        if: matrix.sklearn-version != '1.8'
        run: |
          python unittests/sklearn/decomposition/test_pls_regression.py
          python unittests/sklearn/ensemble/test_sklearn_hist_gradient_boosting_multiclass.py
          python unittests/sklearn/mixture/test_gaussian_mixture.py
          python unittests/sklearn/preprocessing/test_power_transformer.py

      - name: Run sklearn tests with no coverage
        if: matrix.sklearn-version != '1.8'
        run: |
            pytest --durations=10 \
              --ignore=unittests/builder/oxs \
              --ignore=unittests/reference/test__inference_session_torch.py \
              --ignore=unittests/reference/test_backend_torch_reference_evaluator.py \
              --ignore=unittests/reference/test_torch_onnxruntime_evaluator.py \
              --ignore=unittests/reference/test_torch_reference_evaluator.py \
              --ignore=unittests/xoptim/test_torch_untrained_models.py \
              --ignore=unittests/tensorflow \
              --ignore=unittests/torch \
              --ignore unittests/sklearn/decomposition/test_pls_regression.py \
              --ignore unittests/sklearn/ensemble/test_sklearn_hist_gradient_boosting_multiclass.py \
              --ignore unittests/sklearn/mixture/test_gaussian_mixture.py \
              --ignore unittests/sklearn/preprocessing/test_power_transformer.py  # AttributeError: module 'torch' has no attribute 'Tensor'

      - name: Run unittest files with coverage, not pytest
        if: matrix.sklearn-version == '1.8'
        run: |
          python -m coverage run --append unittests/sklearn/ensemble/test_sklearn_hist_gradient_boosting_multiclass.py
          python -m coverage run --append unittests/sklearn/preprocessing/test_power_transformer.py
          coverage xml

      - name: Run sklearn tests with coverage
        if: matrix.sklearn-version == '1.8'
        run: |
            pytest --cov=yobx --cov-report=xml --durations=10 \
              --ignore=unittests/builder/oxs \
              --ignore=unittests/reference/test__inference_session_torch.py \
              --ignore=unittests/reference/test_backend_torch_reference_evaluator.py \
              --ignore=unittests/reference/test_torch_onnxruntime_evaluator.py \
              --ignore=unittests/reference/test_torch_reference_evaluator.py \
              --ignore=unittests/xoptim/test_torch_untrained_models.py \
              --ignore=unittests/tensorflow \
              --ignore=unittests/torch \
              --ignore unittests/sklearn/ensemble/test_sklearn_hist_gradient_boosting_multiclass.py \
              --ignore unittests/sklearn/preprocessing/test_power_transformer.py  # AttributeError: module 'torch' has no attribute 'Tensor'

      - name: Upload coverage to Codecov
        if: matrix.sklearn-version == '1.8'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: sklearn
