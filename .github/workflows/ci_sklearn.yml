name: ci-2-scikit-learn

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sklearn_tests:
    name: sklearn (ubuntu-latest, py3.12, sklearn-${{ matrix.sklearn-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sklearn-version: ["1.4", "1.8"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[category_encoders,dev,imblearn,lightgbm,sklearn,xgboost]"

      - name: Install scikit-learn==${{ matrix.sklearn-version }}
        run: pip install "scikit-learn==${{ matrix.sklearn-version }}.*" && pip freeze

      - name: pip freeze
        run: pip freeze

      - name: Run sklearn tests with no coverage
        if: matrix.sklearn-version != '1.8'
        run: |
          PYTHONWARNINGS="ignore::FutureWarning,ignore::RuntimeWarning" pytest --durations=10 \
            --ignore=unittests/sklearn/sksurv \
            unittests/sklearn

      - name: Run sklearn tests with coverage
        if: matrix.sklearn-version == '1.8'
        run: |
          PYTHONWARNINGS="ignore::FutureWarning,ignore::RuntimeWarning" coverage run -m pytest \
            --ignore=unittests/sklearn/sksurv \
            unittests/sklearn
          coverage xml

      - name: Parity with sklearn-onnx
        run: |
          pip install skl2onnx
          pytest --durations=10 unittests/parity

      - name: Upload coverage to Codecov
        if: matrix.sklearn-version == '1.8'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: sklearn
