name: ci-2-scikit-learn

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_sklearn_subfolder:
    name: Detect unique sklearn subfolder
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      subfolder: ${{ steps.detect.outputs.subfolder }}
      count: ${{ steps.detect.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect unique yobx/sklearn subfolder
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$changed"

          # If any changed file is outside yobx/sklearn/ and unittests/sklearn/, no unique subfolder.
          non_sklearn=$(echo "$changed" \
            | grep -v '^yobx/sklearn/' \
            | grep -v '^unittests/sklearn/' \
            | grep -c '\S' || true)
          if [ "$non_sklearn" -gt 0 ]; then
            echo "subfolder=" >> "$GITHUB_OUTPUT"
            echo "count=0"    >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Reject files sitting directly in yobx/sklearn/ or unittests/sklearn/ (no subdirectory).
          root_files=$(echo "$changed" \
            | grep -E '^(yobx/sklearn|unittests/sklearn)/[^/]+$' \
            | grep -c '\S' || true)
          if [ "$root_files" -gt 0 ]; then
            echo "subfolder=" >> "$GITHUB_OUTPUT"
            echo "count=0"    >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract second-level subdirectory under yobx/sklearn/.
          yobx_subs=$(echo "$changed" \
            | grep '^yobx/sklearn/' \
            | awk -F'/' '{if (NF >= 4) print $3}' \
            | sort -u)

          # Extract second-level subdirectory under unittests/sklearn/ (strip leading _ used for
          # extra-library test directories such as _imblearn, _lightgbm, etc.).
          test_subs=$(echo "$changed" \
            | grep '^unittests/sklearn/' \
            | awk -F'/' '{if (NF >= 4) print $3}' \
            | sed 's/^_//' \
            | sort -u)

          # Combine and count unique subfolders.
          all_subs=$(printf '%s\n%s\n' "$yobx_subs" "$test_subs" \
            | grep -v '^$' | sort -u)
          count=$(echo "$all_subs" | grep -c '\S' || true)
          subfolder=$(echo "$all_subs" | head -1)

          echo "Impacted sklearn subfolders: $all_subs (count=$count)"
          echo "subfolder=$subfolder" >> "$GITHUB_OUTPUT"
          echo "count=$count"         >> "$GITHUB_OUTPUT"

  sklearn_targeted_tests:
    name: sklearn targeted (${{ needs.detect_sklearn_subfolder.outputs.subfolder }}, sklearn-${{ matrix.sklearn-version }})
    needs: detect_sklearn_subfolder
    if: needs.detect_sklearn_subfolder.outputs.count == '1'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        sklearn-version: ["1.4", "1.8"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scikit-learn==${{ matrix.sklearn-version }}
        run: pip install "scikit-learn==${{ matrix.sklearn-version }}.*"

      - name: Install dependencies
        run: pip install -e ".[category_encoders,dev,imblearn,lightgbm,sklearn,sksurv,statsmodels,xgboost]"

      - name: Install scikit-learn==${{ matrix.sklearn-version }} again
        run: pip install "scikit-learn==${{ matrix.sklearn-version }}.*" && pip freeze

      - name: Resolve targeted test directory
        id: testdir
        env:
          SUBFOLDER: ${{ needs.detect_sklearn_subfolder.outputs.subfolder }}
        run: |
          # Extra-library test directories use a leading underscore (e.g. _imblearn).
          if [ -d "unittests/sklearn/_${SUBFOLDER}" ]; then
            echo "testdir=unittests/sklearn/_${SUBFOLDER}" >> "$GITHUB_OUTPUT"
          elif [ -d "unittests/sklearn/${SUBFOLDER}" ]; then
            echo "testdir=unittests/sklearn/${SUBFOLDER}" >> "$GITHUB_OUTPUT"
          else
            echo "No test directory found for subfolder '${SUBFOLDER}'" >&2
            exit 1
          fi

      - name: Run targeted sklearn tests
        run: |
          PYTHONWARNINGS="ignore::FutureWarning,ignore::RuntimeWarning" \
            python -m unittest discover -s ${{ steps.testdir.outputs.testdir }}

  sklearn_tests:
    name: sklearn (ubuntu-latest, py3.12, sklearn-${{ matrix.sklearn-version }})
    needs: sklearn_targeted_tests
    # Run when targeted tests succeeded or were skipped (no unique subfolder / not a PR).
    # Do NOT run when targeted tests failed – that already signals a broken subfolder.
    if: >-
      always() && (
        needs.sklearn_targeted_tests.result == 'success' ||
        needs.sklearn_targeted_tests.result == 'skipped'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sklearn-version: ["1.4", "1.8"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scikit-learn==${{ matrix.sklearn-version }}
        run: pip install "scikit-learn==${{ matrix.sklearn-version }}.*"

      - name: Install dependencies
        run: pip install -e ".[category_encoders,dev,imblearn,lightgbm,sklearn,sksurv,statsmodels,xgboost]"

      - name: Install scikit-learn==${{ matrix.sklearn-version }} again
        run: pip install "scikit-learn==${{ matrix.sklearn-version }}.*" && pip freeze

      - name: Run sklearn files with coverage, not pytest
        if: matrix.sklearn-version != '1.8'
        run: |
          PYTHONWARNINGS="ignore::FutureWarning,ignore::RuntimeWarning" python -m unittest discover -s unittests/sklearn

      - name: Run sklearn files with coverage, not pytest
        if: matrix.sklearn-version == '1.8'
        run: |
          PYTHONWARNINGS="ignore::FutureWarning,ignore::RuntimeWarning" coverage run -m unittest discover -s unittests/sklearn
          coverage xml

      - name: Parity with sklearn-onnx
        run: |
          pip install skl2onnx
          pytest --durations=10 unittests/parity/with_skl2onnx

      - name: Upload coverage to Codecov
        if: matrix.sklearn-version == '1.8'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: sklearn
