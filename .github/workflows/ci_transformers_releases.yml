name: ci-9-transformers

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_torch_subfolder:
    uses: ./.github/workflows/common_detect_torch_subfolder.yml
    permissions:
      contents: read
    with:
      base_sha: ${{ github.event.pull_request.base.sha }}
      head_sha: ${{ github.event.pull_request.head.sha }}

  torch_targeted_tests:
    name: tr-releases targeted (${{ needs.detect_torch_subfolder.outputs.subfolder }}, torch-2.11, transformers-5.5)
    needs: detect_torch_subfolder
    # Skip if no unique subfolder, or if the subfolder is 'coverage' (excluded from the full run).
    if: needs.detect_torch_subfolder.outputs.count == '1' && needs.detect_torch_subfolder.outputs.subfolder != 'coverage'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pytorch 2.11
        run: pip install torch==2.11.0+cpu torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install -e ".[dev,torch,transformers]"
      - name: Install transformers==5.5
        run: pip install transformers==5.5 && pip freeze
      - name: Run targeted torch tests
        run: |
          pytest --durations=10 unittests/torch/${{ needs.detect_torch_subfolder.outputs.subfolder }}

  torch_tests_4:
    name: tr-releases (ubuntu-latest, py3.13, transformers 4.57/4.55/4.49 torch-${{ matrix.torch-version }})
    needs: torch_targeted_tests
    # Run when targeted tests succeeded or were skipped (no unique subfolder / not a PR).
    # Do NOT run when targeted tests failed – that already signals a broken subfolder.
    if: >-
      always() && (
        needs.torch_targeted_tests.result == 'success' ||
        needs.torch_targeted_tests.result == 'skipped'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        torch-version: ["2.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pytorch 2.11
        if: matrix.torch-version == '2.11'
        run: pip install torch==2.11.0+cpu torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
      - name: Install nightly pytorch
        if: matrix.torch-version == 'nightly'
        run: pip install --pre --upgrade torch torchvision torchaudio --index-url https://download.pytorch.org/whl/nightly/cpu

      - name: Install dependencies
        run: pip install -e ".[dev,torch,transformers]"

      - name: install transformers==4.49 and pip freeze
        run: pip install transformers==4.49 && pip freeze
      - name: Run tests with transformers==4.49
        run: pytest unittests/torch --durations=10 --ignore=unittests/torch/coverage

      - name: install transformers==4.55 and pip freeze
        run: pip install transformers==4.55 && pip freeze
      - name: Run tests with transformers==4.55
        run: pytest unittests/torch --durations=10 --ignore=unittests/torch/coverage

      - name: install transformers==4.57 and pip freeze
        run: pip install transformers==4.57 && pip freeze
      - name: Run tests with transformers==4.57
        run: pytest unittests/torch --durations=10 --ignore=unittests/torch/coverage

  torch_tests_5:
    name: transformers-releases (ubuntu-latest, py3.13, transformers 5.5/5.2 torch-${{ matrix.torch-version }})
    needs: torch_targeted_tests
    # Run when targeted tests succeeded or were skipped (no unique subfolder / not a PR).
    # Do NOT run when targeted tests failed – that already signals a broken subfolder.
    if: >-
      always() && (
        needs.torch_targeted_tests.result == 'success' ||
        needs.torch_targeted_tests.result == 'skipped'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        torch-version: ["2.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pytorch 2.11
        if: matrix.torch-version == '2.11'
        run: pip install torch==2.11.0+cpu torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
      - name: Install nightly pytorch
        if: matrix.torch-version == 'nightly'
        run: pip install --pre --upgrade torch torchvision torchaudio --index-url https://download.pytorch.org/whl/nightly/cpu

      - name: Install dependencies
        run: pip install -e ".[dev,torch,transformers]"

      - name: install transformers==5.5 and pip freeze
        run: pip install transformers==5.5 && pip freeze
      - name: Run tests with transformers==5.5
        run: pytest unittests/torch --durations=10 --ignore=unittests/torch/coverage

      - name: install transformers==5.2 and pip freeze
        run: pip install transformers==5.2 && pip freeze
      - name: Run tests with transformers==5.2
        run: pytest unittests/torch --durations=10 --ignore=unittests/torch/coverage
