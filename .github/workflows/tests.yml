name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }}, torch-${{ matrix.torch-version || 'stable' }}, transformers-${{ matrix.transformers-version || 'latest' }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        exclude:
          - os: "macos-latest"
            python-version: "3.10"
          - os: "macos-latest"
            python-version: "3.11"
          - os: "macos-latest"
            python-version: "3.12"
          - os: "windows-latest"
            python-version: "3.10"
          - os: "windows-latest"
            python-version: "3.11"
          - os: "windows-latest"
            python-version: "3.12"
        include:
          - python-version: "3.13"
            torch-version: "nightly"
          - python-version: "3.10"
            transformers-version: "4.49"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install nightly pytorch
        if: matrix.python-version == '3.13'
        run: pip install --pre --upgrade torch torchvision torchaudio --index-url https://download.pytorch.org/whl/nightly/cpu

      - name: Install pytorch 2.10
        if: matrix.python-version != '3.13'
        run: pip install torch==2.10.0+cpu torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install transformers==4.49 (Python 3.10 only)
        if: matrix.python-version == '3.10'
        run: pip install transformers==4.49

      - name: Install dependencies
        run: pip install -e ".[dev,docs,torch]"

      - name: pip freeze
        run: pip freeze

      - name: Run tests
        run: pytest --cov=yobx --cov-report=xml --durations=10

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
