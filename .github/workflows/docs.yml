name: Documentation

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "**.md"
      - "**.rst"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - "**.md"
      - "**.rst"

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[docs,torch]"
      - name: Build documentation
        run: sphinx-build -b html docs docs/_build/html -W
