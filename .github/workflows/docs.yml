name: Documentation

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "**.md"
      - "**.rst"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - "**.md"
      - "**.rst"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install graphviz
        uses: ts-graphviz/setup-graphviz@v2
      - name: Install pandoc
        run: sudo apt-get install -y pandoc
      - name: Install nightly version
        run: pip install --pre --upgrade torch torchvision torchaudio --index-url https://download.pytorch.org/whl/nightly/cpu
      - name: Install dependencies
        run: pip install -e ".[category_encoders,docs,imblearn,lightgbm,op-db,polars,sklearn,sksurv,spox,statmodels,tensorflow,torch,transformers,xgboost]"
      - name: pip freeze
        run: pip freeze
      - name: Build TensorFlow gallery examples
        run: |
          UNITTEST_GOING=1 sphinx-build -b html \
            -D "sphinx_gallery_conf.filename_pattern=/tensorflow/" \
            docs docs/_build/html -j 1
      - name: Build documentation
        run: |
          UNITTEST_GOING=1 sphinx-build -b html docs docs/_build/html -W -j auto || \
          (echo "Parallel build failed, retrying sequentially..." && \
          sphinx-build -b html docs docs/_build/html -W)
