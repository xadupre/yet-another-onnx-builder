name: ci-5-torch

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_torch_subfolder:
    uses: ./.github/workflows/common_detect_torch_subfolder.yml
    permissions:
      contents: read
    with:
      base_sha: ${{ github.event.pull_request.base.sha }}
      head_sha: ${{ github.event.pull_request.head.sha }}

  torch_targeted_tests:
    name: torch targeted (${{ needs.detect_torch_subfolder.outputs.subfolder }})
    needs: detect_torch_subfolder
    # Skip if no unique subfolder, or if the subfolder is 'coverage' (excluded from the full run).
    if: needs.detect_torch_subfolder.outputs.count == '1' && needs.detect_torch_subfolder.outputs.subfolder != 'coverage'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install nightly pytorch
        run: pip install --pre --upgrade torch torchvision torchaudio --index-url https://download.pytorch.org/whl/nightly/cpu

      - name: Install dependencies
        run: pip install -e ".[dev,torch,transformers]"

      - name: pip freeze
        run: pip freeze

      - name: Run targeted torch tests
        run: |
          pytest --durations=10 unittests/torch/${{ needs.detect_torch_subfolder.outputs.subfolder }}

  coverage:
    name: torch (ubuntu-latest, py3.13)
    needs: torch_targeted_tests
    # Run when targeted tests succeeded or were skipped (no unique subfolder / not a PR).
    # Do NOT run when targeted tests failed – that already signals a broken subfolder.
    if: >-
      always() && (
        needs.torch_targeted_tests.result == 'success' ||
        needs.torch_targeted_tests.result == 'skipped'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install nightly pytorch
        run: pip install --pre --upgrade torch torchvision torchaudio --index-url https://download.pytorch.org/whl/nightly/cpu

      - name: Install dependencies
        run: pip install -e ".[dev,torch,transformers]"

      - name: pip freeze
        run: pip freeze

      - name: Run tests with coverage
        run: |
          pytest --cov=yobx --cov-report=xml --durations=10 \
            --ignore=unittests/parity \
            --ignore=unittests/sql \
            --ignore=unittests/sklearn \
            --ignore=unittests/tensorflow \
            --ignore=unittests/torch/coverage

      - name: Upload coverage to Codecov
        # Codecov automatically merges all uploads that share the same commit SHA.
        # The sklearn_tests.yml job (scikit-learn 1.8 only) also uploads a coverage
        # report flagged as 'sklearn'. Codecov unions the line-hit data from both
        # uploads into a single combined report. The 'flags' value here ('coverage')
        # lets you filter/view each source separately in the Codecov UI without
        # preventing them from being merged.
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: coverage
