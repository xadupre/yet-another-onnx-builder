name: ci-8-transformers

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_torch_subfolder:
    name: Detect unique torch subfolder
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      subfolder: ${{ steps.detect.outputs.subfolder }}
      count: ${{ steps.detect.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect unique yobx/torch subfolder
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$changed"

          # If any changed file is outside yobx/torch/ and unittests/torch/, no unique subfolder.
          non_torch=$(echo "$changed" \
            | grep -v '^yobx/torch/' \
            | grep -v '^unittests/torch/' \
            | grep -c '\S' || true)
          if [ "$non_torch" -gt 0 ]; then
            echo "subfolder=" >> "$GITHUB_OUTPUT"
            echo "count=0"    >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Reject files sitting directly in yobx/torch/ or unittests/torch/ (no subdirectory).
          root_files=$(echo "$changed" \
            | grep -E '^(yobx/torch|unittests/torch)/[^/]+$' \
            | grep -c '\S' || true)
          if [ "$root_files" -gt 0 ]; then
            echo "subfolder=" >> "$GITHUB_OUTPUT"
            echo "count=0"    >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract second-level subdirectory under yobx/torch/.
          yobx_subs=$(echo "$changed" \
            | grep '^yobx/torch/' \
            | awk -F'/' '{if (NF >= 4) print $3}' \
            | sort -u)

          # Extract second-level subdirectory under unittests/torch/.
          test_subs=$(echo "$changed" \
            | grep '^unittests/torch/' \
            | awk -F'/' '{if (NF >= 4) print $3}' \
            | sort -u)

          # Combine and count unique subfolders.
          all_subs=$(printf '%s\n%s\n' "$yobx_subs" "$test_subs" \
            | grep -v '^$' | sort -u)
          count=$(echo "$all_subs" | grep -c '\S' || true)
          subfolder=$(echo "$all_subs" | head -1)

          # Verify the test directory exists (some source subdirs have no test counterpart).
          if [ "$count" -eq 1 ] && [ ! -d "unittests/torch/${subfolder}" ]; then
            echo "No test directory for subfolder '${subfolder}', skipping targeted tests."
            echo "subfolder=" >> "$GITHUB_OUTPUT"
            echo "count=0"    >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Impacted torch subfolders: $all_subs (count=$count)"
          echo "subfolder=$subfolder" >> "$GITHUB_OUTPUT"
          echo "count=$count"         >> "$GITHUB_OUTPUT"

  torch_targeted_tests:
    name: tr-dev targeted (${{ needs.detect_torch_subfolder.outputs.subfolder }})
    needs: detect_torch_subfolder
    # Skip if no unique subfolder, or if the subfolder is 'coverage' (excluded from the full run).
    if: needs.detect_torch_subfolder.outputs.count == '1' && needs.detect_torch_subfolder.outputs.subfolder != 'coverage'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install nightly pytorch
        run: pip install --pre --upgrade torch torchvision torchaudio --index-url https://download.pytorch.org/whl/nightly/cpu
      - name: Install development version of transformers
        run: pip install git+https://github.com/huggingface/transformers.git
      - name: Install dependencies
        run: pip install -e ".[dev,torch,transformers]"
      - name: pip freeze
        run: pip freeze
      - name: Run targeted torch tests
        run: |
          pytest --durations=10 unittests/torch/${{ needs.detect_torch_subfolder.outputs.subfolder }}

  transformers_dev:
    name: tr-dev (ubuntu-latest, py3.13, transformers-dev, torch-nightly)
    needs: torch_targeted_tests
    # Run when targeted tests succeeded or were skipped (no unique subfolder / not a PR).
    # Do NOT run when targeted tests failed – that already signals a broken subfolder.
    if: >-
      always() && (
        needs.torch_targeted_tests.result == 'success' ||
        needs.torch_targeted_tests.result == 'skipped'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install nightly pytorch
        run: pip install --pre --upgrade torch torchvision torchaudio --index-url https://download.pytorch.org/whl/nightly/cpu
      - name: Install development version of transformers
        run: pip install git+https://github.com/huggingface/transformers.git
      - name: Install dependencies
        run: pip install -e ".[dev,torch,transformers]"
      - name: pip freeze
        run: pip freeze
      - name: Run tests
        run: pytest --durations=10 unittests/torch --ignore=unittests/torch/coverage
