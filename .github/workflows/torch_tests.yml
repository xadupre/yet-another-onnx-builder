name: Torch Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 4 * * *"

jobs:
  torch_tests:
    name: torch tests (ubuntu-latest, py3.12, torch-${{ matrix.torch-version }}, transformers-${{ matrix.transformers-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        torch-version: ["2.10", "nightly"]
        transformers-version: ["4.49", "4.55", "4.57", "5.2", "main"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,docs,torch]"
      - name: Install transformers ${{ matrix.transformers-version }} (versioned)
        if: matrix.transformers-version != 'main'
        run: pip install transformers==${{ matrix.transformers-version }}
      - name: Install transformers from main branch
        if: matrix.transformers-version == 'main'
        run: pip install git+https://github.com/huggingface/transformers.git
      - name: Install pytorch 2.10
        if: matrix.torch-version == '2.10'
        run: pip install torch==2.10.0+cpu torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
      - name: Install nightly pytorch
        if: matrix.torch-version == 'nightly'
        run: pip install --pre --upgrade torch torchvision torchaudio --index-url https://download.pytorch.org/whl/nightly/cpu
      - name: pip freeze
        run: pip freeze
      - name: Run tests
        run: pytest unittests/torch --durations=10
