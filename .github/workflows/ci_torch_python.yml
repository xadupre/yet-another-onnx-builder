name: ci-4-torch

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: torch-py (${{ matrix.os }}, py${{ matrix.python-version }}, torch-${{ matrix.torch-version || 'stable' }}, transformers-${{ matrix.transformers-version || 'latest' }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.12", "3.13"]
        transformers-version: ["5.5"]
        torch-version: ["2.11", "nightly"]
        exclude:
          - os: "macos-latest"
            python-version: "3.12"
          - os: "windows-latest"
            python-version: "3.12"
          - os: "macos-latest"
            torch-version: "nightly"
          - os: "windows-latest"
            torch-version: "nightly"
          - os: "ubuntu-latest"
            python-version: "3.12"
            torch-version: "nightly"
          - os: "ubuntu-latest"
            python-version: "3.13"
            torch-version: "2.11"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install nightly pytorch
        if: matrix.torch-version == 'nightly'
        run: pip install --pre --upgrade torch torchvision torchaudio --index-url https://download.pytorch.org/whl/nightly/cpu

      - name: Install pytorch 2.11 (Linux/Windows)
        if: matrix.torch-version == '2.11' && matrix.os != 'macos-latest'
        run: pip install torch==2.11.0+cpu torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install pytorch 2.11 (macOS)
        if: matrix.torch-version == '2.11' && matrix.os == 'macos-latest'
        run: pip install torch==2.11.0 torchvision torchaudio

      - name: Install dependencies
        run: pip install -e ".[dev,torch,transformers]"

      - name: pip freeze
        run: pip freeze

      - name: Run tests
        run: |
          pytest --durations=10 --ignore=unittests/parity --ignore=unittests/sklearn --ignore=unittests/sql --ignore=unittests/tensorflow --ignore=unittests/torch/coverage
