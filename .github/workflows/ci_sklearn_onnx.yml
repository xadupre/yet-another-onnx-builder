name: sklearn-onnx compatibility

# This workflow is triggered manually.  It runs the upstream sklearn-onnx
# (skl2onnx) test suite with ``skl2onnx.convert_sklearn`` replaced by
# ``yobx.sklearn.to_onnx``.  A ``conftest.py`` written into the cloned
# ``tests/`` directory patches the function before any test file imports it,
# so the actual skl2onnx unit tests exercise yobx's converter transparently.
#
# Tests for models that yobx does not yet support will fail; those failures
# are expected and informative.  The step uses ``continue-on-error: true``
# so the result log is always uploaded as an artifact.

on:
  workflow_dispatch:

jobs:
  sklearn_onnx_tests:
    name: sklearn-onnx compat (ubuntu-latest, py3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yobx with sklearn extras
        run: pip install -e ".[dev,sklearn]"

      - name: pip freeze
        run: pip freeze

      # ------------------------------------------------------------------
      # Clone the upstream sklearn-onnx repository
      # ------------------------------------------------------------------

      - name: Clone sklearn-onnx
        run: git clone --depth 1 https://github.com/onnx/sklearn-onnx.git /tmp/sklearn-onnx

      # ------------------------------------------------------------------
      # Write a conftest.py into the cloned tests/ directory.
      # pytest loads conftest.py before importing any test file, so
      # patching skl2onnx.convert_sklearn here ensures that every
      # ``from skl2onnx import convert_sklearn`` in the test suite gets
      # yobx's implementation.
      # ------------------------------------------------------------------

      - name: Write conftest.py to replace convert_sklearn with yobx
        run: |
          cat > /tmp/sklearn-onnx/tests/conftest.py << 'CONFEOF'
          # SPDX-License-Identifier: Apache-2.0
          """
          conftest.py – patches skl2onnx.convert_sklearn so that the sklearn-onnx
          test suite exercises yobx.sklearn.to_onnx instead of skl2onnx's own converter.

          pytest loads this file before importing any test module, so every
          ``from skl2onnx import convert_sklearn`` in the test files picks up the
          patched implementation automatically.
          """

          import numpy as np
          import skl2onnx

          try:
              from skl2onnx.common.data_types import (
                  FloatTensorType,
                  DoubleTensorType,
                  Int64TensorType,
              )
          except ImportError:
              FloatTensorType = DoubleTensorType = Int64TensorType = None

          from yobx.sklearn import to_onnx
          from yobx import DEFAULT_TARGET_OPSET


          def _make_dummy_input(type_obj):
              """Create a small concrete numpy array from a skl2onnx type descriptor.

              Shape dimensions that are None or 0 are replaced with 3 so that
              the resulting array is valid for fitting a scikit-learn estimator.
              """
              if type_obj is None:
                  return np.ones((3, 1), dtype=np.float32)
              shape = getattr(type_obj, "shape", [None, 1])
              concrete = []
              for d in shape:
                  if d is None or d == 0:
                      concrete.append(3)
                  else:
                      try:
                          concrete.append(int(d))
                      except (TypeError, ValueError):
                          concrete.append(3)
              if DoubleTensorType is not None and isinstance(type_obj, DoubleTensorType):
                  return np.ones(concrete, dtype=np.float64)
              if Int64TensorType is not None and isinstance(type_obj, Int64TensorType):
                  return np.zeros(concrete, dtype=np.int64)
              return np.ones(concrete, dtype=np.float32)


          def _yobx_convert_sklearn(
              model,
              name=None,
              initial_types=None,
              doc_string="",
              target_opset=None,
              custom_conversion_functions=None,
              custom_shape_calculators=None,
              custom_parsers=None,
              options=None,
              intermediate=False,
              white_op=None,
              black_op=None,
              final_types=None,
              dtype=None,
              naming=None,
              model_optim=True,
              verbose=0,
          ):
              """Drop-in replacement for skl2onnx.convert_sklearn that delegates to yobx."""
              if not initial_types:
                  initial_types = [("X", None)]
              args = tuple(_make_dummy_input(t) for _, t in initial_types)
              input_names = [n for n, _ in initial_types]
              return to_onnx(
                  model,
                  args,
                  input_names=input_names,
                  target_opset=target_opset if target_opset is not None else DEFAULT_TARGET_OPSET,
              )


          # Patch at module level so that all subsequent
          # ``from skl2onnx import convert_sklearn`` statements in test files
          # receive the yobx implementation.
          skl2onnx.convert_sklearn = _yobx_convert_sklearn
          CONFEOF

      # ------------------------------------------------------------------
      # Run the upstream sklearn-onnx test suite.
      # Tests that yobx does not yet support will fail; this is expected.
      # continue-on-error keeps the job alive so results are always uploaded.
      # ------------------------------------------------------------------

      - name: Run sklearn-onnx tests with yobx converter
        working-directory: /tmp/sklearn-onnx
        continue-on-error: true
        run: |
          pytest tests/ \
            --ignore=tests/test_algebra_cascade.py \
            --ignore=tests/test_algebra_complex.py \
            --ignore=tests/test_algebra_converters.py \
            --ignore=tests/test_algebra_custom_model.py \
            --ignore=tests/test_algebra_custom_model_sub_estimator.py \
            --ignore=tests/test_algebra_deprecation.py \
            --ignore=tests/test_algebra_double.py \
            --ignore=tests/test_algebra_onnx_doc.py \
            --ignore=tests/test_algebra_onnx_operator_mixin_syntax.py \
            --ignore=tests/test_algebra_onnx_operators.py \
            --ignore=tests/test_algebra_onnx_operators_if.py \
            --ignore=tests/test_algebra_onnx_operators_opset.py \
            --ignore=tests/test_algebra_onnx_operators_scan.py \
            --ignore=tests/test_algebra_onnx_operators_sparse.py \
            --ignore=tests/test_algebra_onnx_operators_sub_estimator.py \
            --ignore=tests/test_algebra_onnx_operators_wrapped.py \
            --ignore=tests/test_algebra_symbolic.py \
            --ignore=tests/test_algebra_test_helper.py \
            --ignore=tests/test_utils_sklearn.py \
            --durations=20 \
            -q \
            2>&1 | tee /tmp/sklearn-onnx-test-results.txt || true

      - name: Upload sklearn-onnx test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sklearn-onnx-test-results
          path: /tmp/sklearn-onnx-test-results.txt
          retention-days: 7
