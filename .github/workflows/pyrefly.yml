name: Pyrefly

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pyrefly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytorch 2.10
        if: matrix.torch-version == '2.10'
        run: pip install torch==2.10.0+cpu torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install -e ".[dev,torch,sklearn,spox,tensorflow]" pyrefly
      - name: Run pyrefly
        run: pyrefly check
