name: Pyrefly

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pyrefly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,torch]" pyrefly
      - name: Run pyrefly
        run: pyrefly check
