<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e2a45"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <!-- Node gradients: 5 distinct colors -->
    <radialGradient id="n1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </radialGradient>
    <radialGradient id="n2" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffdd57"/>
      <stop offset="100%" stop-color="#f0a500"/>
    </radialGradient>
    <radialGradient id="n3" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff9f43"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </radialGradient>
    <radialGradient id="n4" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#55efc4"/>
      <stop offset="100%" stop-color="#00b894"/>
    </radialGradient>
    <radialGradient id="n5" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fd79a8"/>
      <stop offset="100%" stop-color="#e84393"/>
    </radialGradient>
    <!-- Edge gradients between connected nodes -->
    <linearGradient id="e12" x1="20" y1="55" x2="52" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#ffdd57"/>
    </linearGradient>
    <linearGradient id="e13" x1="20" y1="55" x2="52" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#ff9f43"/>
    </linearGradient>
    <linearGradient id="e24" x1="52" y1="24" x2="90" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffdd57"/>
      <stop offset="100%" stop-color="#55efc4"/>
    </linearGradient>
    <linearGradient id="e25" x1="52" y1="24" x2="90" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffdd57"/>
      <stop offset="100%" stop-color="#fd79a8"/>
    </linearGradient>
    <linearGradient id="e35" x1="52" y1="80" x2="90" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff9f43"/>
      <stop offset="100%" stop-color="#fd79a8"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="33%" stop-color="#ffdd57"/>
      <stop offset="66%" stop-color="#55efc4"/>
      <stop offset="100%" stop-color="#fd79a8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bgGrad)" stroke="#4fa3e0" stroke-width="2"/>
  <!-- Edges (drawn before nodes so nodes render on top) -->
  <!-- input → upper-mid -->
  <line x1="20" y1="55" x2="52" y2="24" stroke="url(#e12)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- input → lower-mid -->
  <line x1="20" y1="55" x2="52" y2="80" stroke="url(#e13)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- upper-mid → upper-out -->
  <line x1="52" y1="24" x2="90" y2="32" stroke="url(#e24)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- upper-mid → lower-out (cross edge) -->
  <line x1="52" y1="24" x2="90" y2="78" stroke="url(#e25)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- lower-mid → lower-out -->
  <line x1="52" y1="80" x2="90" y2="78" stroke="url(#e35)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Nodes: 5-node DAG flowing left-to-right -->
  <!-- Input node (blue) -->
  <circle cx="20" cy="55" r="9" fill="url(#n1)" stroke="#fff" stroke-width="1.5"/>
  <!-- Upper-middle node (yellow) -->
  <circle cx="52" cy="24" r="9" fill="url(#n2)" stroke="#fff" stroke-width="1.5"/>
  <!-- Lower-middle node (orange) -->
  <circle cx="52" cy="80" r="9" fill="url(#n3)" stroke="#fff" stroke-width="1.5"/>
  <!-- Upper-output node (green) -->
  <circle cx="90" cy="32" r="9" fill="url(#n4)" stroke="#fff" stroke-width="1.5"/>
  <!-- Lower-output node (pink) -->
  <circle cx="90" cy="78" r="9" fill="url(#n5)" stroke="#fff" stroke-width="1.5"/>
  <!-- Label -->
  <text x="60" y="108" font-family="monospace" font-size="14" fill="url(#textGrad)" font-weight="bold" text-anchor="middle">yobx</text>
</svg>
