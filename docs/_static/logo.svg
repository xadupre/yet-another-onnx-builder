<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2438"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <!-- ONNX node: blue -->
    <radialGradient id="nOnnx" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <!-- yobx node: amber -->
    <radialGradient id="nYobx" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <!-- ORT node: green -->
    <radialGradient id="nOrt" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>
    <!-- Edge gradients -->
    <linearGradient id="eOY" x1="30" y1="80" x2="60" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="eYR" x1="60" y1="28" x2="90" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="eOR" x1="30" y1="80" x2="90" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <!-- yobx label gradient -->
    <linearGradient id="lblGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="60" cy="60" r="58" fill="url(#bgGrad)" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Triangle edges (behind nodes) -->
  <!-- onnx (bottom-left) → yobx (top) -->
  <line x1="30" y1="80" x2="60" y2="28" stroke="url(#eOY)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- yobx (top) → ort (bottom-right) -->
  <line x1="60" y1="28" x2="90" y2="80" stroke="url(#eYR)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- onnx (bottom-left) → ort (bottom-right) -->
  <line x1="30" y1="80" x2="90" y2="80" stroke="url(#eOR)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Nodes -->
  <!-- Top: yobx (amber) -->
  <circle cx="60" cy="28" r="12" fill="url(#nYobx)" stroke="#fff" stroke-width="1.5"/>
  <!-- Bottom-left: onnx (blue) -->
  <circle cx="30" cy="80" r="10" fill="url(#nOnnx)" stroke="#fff" stroke-width="1.5"/>
  <!-- Bottom-right: ort (green) -->
  <circle cx="90" cy="80" r="10" fill="url(#nOrt)" stroke="#fff" stroke-width="1.5"/>
  <!-- Node labels -->
  <text x="30" y="98" font-family="monospace" font-size="6.5" fill="#93c5fd" text-anchor="middle" font-weight="bold">onnx</text>
  <text x="90" y="98" font-family="monospace" font-size="6.5" fill="#6ee7b7" text-anchor="middle" font-weight="bold">ort</text>
  <!-- Center label: yobx -->
  <text x="60" y="60" font-family="monospace" font-size="13" fill="url(#lblGrad)" font-weight="bold" text-anchor="middle">yobx</text>
</svg>
