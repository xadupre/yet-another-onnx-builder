<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e2a45"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <!-- Node gradients -->
    <radialGradient id="nodeTop" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffdd57"/>
      <stop offset="100%" stop-color="#f0a500"/>
    </radialGradient>
    <radialGradient id="nodeLeft" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </radialGradient>
    <radialGradient id="nodeRight" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#48cfad"/>
      <stop offset="100%" stop-color="#1a9e74"/>
    </radialGradient>
    <!-- Edge gradient left -->
    <linearGradient id="edgeLeft" x1="60" y1="22" x2="28" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffdd57"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <!-- Edge gradient right -->
    <linearGradient id="edgeRight" x1="60" y1="22" x2="92" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffdd57"/>
      <stop offset="100%" stop-color="#48cfad"/>
    </linearGradient>
    <!-- Edge gradient bottom -->
    <linearGradient id="edgeBottom" x1="28" y1="78" x2="92" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#48cfad"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="50%" stop-color="#ffdd57"/>
      <stop offset="100%" stop-color="#48cfad"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bgGrad)" stroke="#4fa3e0" stroke-width="2"/>
  <!-- Edges connecting nodes -->
  <line x1="60" y1="22" x2="28" y2="78" stroke="url(#edgeLeft)" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="22" x2="92" y2="78" stroke="url(#edgeRight)" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="78" x2="92" y2="78" stroke="url(#edgeBottom)" stroke-width="3" stroke-linecap="round"/>
  <!-- ONNX graph nodes (circles connected by lines) -->
  <!-- Top node -->
  <circle cx="60" cy="22" r="10" fill="url(#nodeTop)" stroke="#fff" stroke-width="1.5"/>
  <!-- Bottom-left node -->
  <circle cx="28" cy="78" r="10" fill="url(#nodeLeft)" stroke="#fff" stroke-width="1.5"/>
  <!-- Bottom-right node -->
  <circle cx="92" cy="78" r="10" fill="url(#nodeRight)" stroke="#fff" stroke-width="1.5"/>
  <!-- Center label -->
  <text x="60" y="108" font-family="monospace" font-size="14" fill="url(#textGrad)" font-weight="bold" text-anchor="middle">yobx</text>
</svg>
